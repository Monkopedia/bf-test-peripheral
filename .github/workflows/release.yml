name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.4
    strategy:
      matrix:
        target: [esp32c6, esp32c3, esp32s3]
    steps:
      - uses: actions/checkout@v4

      - name: Build for ${{ matrix.target }}
        shell: bash
        run: |
          . $IDF_PATH/export.sh
          idf.py set-target ${{ matrix.target }}
          idf.py build

      - name: Package firmware
        run: |
          mkdir -p release
          cp build/bf-test-peripheral.bin release/bf-test-peripheral-${{ matrix.target }}.bin
          cp build/bootloader/bootloader.bin release/bootloader-${{ matrix.target }}.bin
          cp build/partition_table/partition-table.bin release/partition-table-${{ matrix.target }}.bin

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.target }}
          path: release/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all firmware artifacts
        uses: actions/download-artifact@v4
        with:
          path: firmware
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: firmware/*
